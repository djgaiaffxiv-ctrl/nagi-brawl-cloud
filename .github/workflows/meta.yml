name: Meta cada 6 horas
on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nagi-meta
  cancel-in-progress: false

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Calcular meta
        env:
          BS_TOKEN: ${{ secrets.BS_TOKEN }}
        run: node meta.js
      - name: Guardar
        run: |
          git config user.name "nagi-bot"
          git config user.email "nagi-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/meta.json
          git diff --staged --quiet || git commit -m "meta $(date -u +%FT%TZ)"
          git push
