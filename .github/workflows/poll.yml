name: NAGI BRAWL poller

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos (GitHub puede retrasarlo un poco)
  workflow_dispatch:          # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: nagi-brawl-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sondear historial
        env:
          BS_TOKEN: ${{ secrets.BS_TOKEN }}
          BS_TAGS: ${{ vars.BS_TAGS }}
        run: node poll.js
      - name: Guardar cambios
        run: |
          git config user.name "nagi-bot"
          git config user.email "nagi-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data $(date -u +%FT%TZ)"
          git push
